<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recorder - Speech to Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff5066;
            --accent: #5dccc7;
            --accent-light: #b3e5e1;
            --success: #10b981;
            --ai: #8b5cf6;
            --bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #9ca3af;
            --border: #e5e7eb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --text: #f1f5f9;
                --text-secondary: #cbd5e1;
                --border: #334155;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .container {
            max-width: 380px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* Header */
        .header {
            text-align: center;
            width: 100%;
            padding-bottom: 8px;
        }

        .title {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.2px;
            color: var(--text);
        }

        /* Recording Section */
        .recording-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            padding: 40px 20px;
        }

        /* Mic Button with Ripple */
        .mic-button-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--accent-light);
            opacity: 1;
        }

        .ripple.ripple-1 {
            animation: ripple-animation 1.5s infinite;
        }

        .ripple.ripple-2 {
            animation: ripple-animation 1.5s infinite 0.5s;
        }

        @keyframes ripple-animation {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .ripple.hidden {
            display: none;
        }

        .mic-button {
            position: relative;
            z-index: 2;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 56px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(255, 80, 102, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: manipulation;
        }

        .mic-button:hover:not(.recording) {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(255, 80, 102, 0.45);
        }

        .mic-button:active:not(.recording) {
            transform: scale(0.97);
        }

        .mic-button.recording {
            background: var(--primary);
            box-shadow: 0 8px 24px rgba(255, 80, 102, 0.35);
        }

        /* Recording Time */
        .recording-time {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            min-height: 40px;
            text-align: center;
        }

        /* Waveform Visualization */
        .waveform-container {
            width: 100%;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 0 20px;
            min-height: 60px;
        }

        .waveform-bar {
            width: 2px;
            height: 20px;
            background: var(--primary);
            border-radius: 1px;
            opacity: 0.6;
            animation: waveform 0.6s ease-in-out infinite;
        }

        .waveform-bar:nth-child(1) { animation-delay: 0s; height: 12px; }
        .waveform-bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
        .waveform-bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
        .waveform-bar:nth-child(4) { animation-delay: 0.3s; height: 28px; }
        .waveform-bar:nth-child(5) { animation-delay: 0.4s; height: 32px; }
        .waveform-bar:nth-child(6) { animation-delay: 0.3s; height: 28px; }
        .waveform-bar:nth-child(7) { animation-delay: 0.2s; height: 24px; }
        .waveform-bar:nth-child(8) { animation-delay: 0.1s; height: 16px; }
        .waveform-bar:nth-child(9) { animation-delay: 0s; height: 12px; }

        @keyframes waveform {
            0%, 100% { height: 20px; opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .waveform-container.hidden {
            display: none;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
        }

        .pause-button {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(93, 204, 199, 0.3);
        }

        .pause-button.show {
            display: flex;
        }

        .pause-button:hover {
            transform: scale(1.08);
            background: #4db8ae;
        }

        .stop-button {
            padding: 14px 32px;
            border: none;
            border-radius: 24px;
            background: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 80, 102, 0.25);
            display: none;
            text-transform: capitalize;
        }

        .stop-button.show {
            display: block;
        }

        .stop-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 80, 102, 0.35);
        }

        /* Transcript Section */
        .transcript-section {
            width: 100%;
            padding: 24px;
            background: var(--bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }

        .transcript-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
        }

        .transcript-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
            word-break: break-word;
            min-height: 60px;
        }

        .transcript-text.placeholder {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 14px;
        }

        .char-count {
            font-size: 12px;
            color: var(--text-secondary);
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn-primary {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: var(--success);
            color: white;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-primary:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: var(--border);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-secondary:hover:not(:disabled) {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .btn-secondary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* AI Section */
        .ai-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .ai-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--ai);
            text-align: center;
        }

        .ai-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn-ai {
            background: transparent;
            border: 1.5px solid var(--ai);
            color: var(--ai);
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: none;
            letter-spacing: 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            position: relative;
        }

        .btn-ai:hover:not(:disabled) {
            background: var(--ai);
            color: white;
            transform: translateY(-2px);
        }

        .btn-ai:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--border);
            color: var(--text-secondary);
        }

        .btn-ai.loading {
            background: var(--ai);
            color: white;
        }

        .btn-ai.loading::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.4);
            animation: loading-bar 1s ease-in-out infinite;
        }

        @keyframes loading-bar {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .ai-result-area {
            background: var(--bg);
            border: 1.5px solid var(--ai);
            border-radius: 12px;
            padding: 16px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .ai-result-area.show {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-result-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--ai);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-result-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            word-break: break-word;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        .btn-copy-ai {
            background: var(--ai);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            cursor: pointer;
        }

        .btn-copy-ai:hover {
            opacity: 0.9;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .error-message {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            animation: slideIn 0.3s ease;
            margin-bottom: 12px;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .browser-warning {
            background: #fef3c7;
            color: #92400e;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            margin-bottom: 12px;
        }

        .browser-warning.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Voice Recorder</h1>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="browser-warning" id="browserWarning">
            ⚠️ Speech recognition not supported. Use Chrome, Firefox, Safari, or Edge.
        </div>

        <div class="recording-section">
            <div class="mic-button-container">
                <div class="ripple ripple-1 hidden" id="ripple1"></div>
                <div class="ripple ripple-2 hidden" id="ripple2"></div>
                <button class="mic-button" id="talkButton" title="Hold to start recording">🎤</button>
            </div>

            <div class="recording-time" id="recordingTime">00:00:00</div>

            <div class="waveform-container hidden" id="waveformContainer">
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
            </div>

            <div class="controls">
                <button class="pause-button" id="pauseButton" title="Pause recording">⏸</button>
                <button class="stop-button show" id="stopButton">Stop recording</button>
            </div>
        </div>

        <div class="transcript-section" id="transcriptSection" style="display: none;">
            <div class="transcript-label">Transcript</div>
            <div class="transcript-text placeholder" id="transcriptText">Click and hold the button to start talking...</div>
            <div class="char-count" id="charCount">0 characters</div>
        </div>

        <div class="actions" id="actions" style="display: none;">
            <button class="btn-primary" id="copyButton" disabled>📋 Copy</button>
            <button class="btn-secondary" id="clearButton" disabled>Clear</button>
        </div>

        <div class="ai-section" id="aiSection" style="display: none;">
            <div class="ai-label">✨ AI Enhance</div>
            <div class="ai-buttons">
                <button class="btn-ai" id="btnGrammar" disabled>✏️ Grammar</button>
                <button class="btn-ai" id="btnSummarize" disabled>📝 Summary</button>
                <button class="btn-ai" id="btnFormat" disabled>🗂️ Format</button>
            </div>
            <div class="ai-result-area" id="aiResultArea">
                <div class="ai-result-header">
                    <span id="aiResultLabel">AI Result</span>
                    <button class="btn-copy-ai" id="copyAiButton">Copy</button>
                </div>
                <div class="ai-result-text" id="aiResultText"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const talkButton = document.getElementById('talkButton');
        const recordingTime = document.getElementById('recordingTime');
        const waveformContainer = document.getElementById('waveformContainer');
        const pauseButton = document.getElementById('pauseButton');
        const stopButton = document.getElementById('stopButton');
        const transcriptSection = document.getElementById('transcriptSection');
        const transcriptText = document.getElementById('transcriptText');
        const charCount = document.getElementById('charCount');
        const copyButton = document.getElementById('copyButton');
        const clearButton = document.getElementById('clearButton');
        const actions = document.getElementById('actions');
        const aiSection = document.getElementById('aiSection');
        const toast = document.getElementById('toast');
        const errorMessage = document.getElementById('errorMessage');
        const browserWarning = document.getElementById('browserWarning');
        const btnGrammar = document.getElementById('btnGrammar');
        const btnSummarize = document.getElementById('btnSummarize');
        const btnFormat = document.getElementById('btnFormat');
        const aiResultArea = document.getElementById('aiResultArea');
        const aiResultText = document.getElementById('aiResultText');
        const aiResultLabel = document.getElementById('aiResultLabel');
        const copyAiButton = document.getElementById('copyAiButton');
        const ripple1 = document.getElementById('ripple1');
        const ripple2 = document.getElementById('ripple2');

        const API_BASE = window.location.origin;

        let recognition;
        let isRecording = false;
        let currentTranscript = '';
        let finalTranscript = '';
        let recordingStartTime = 0;
        let recordingTimer = null;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            browserWarning.classList.add('show');
            talkButton.disabled = true;
            showError('Speech recognition not supported in your browser');
        } else {
            try {
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
            } catch (e) {
                showError('Failed to initialize speech recognition');
                talkButton.disabled = true;
            }
        }

        if (recognition) {
            recognition.onstart = () => {
                isRecording = true;
                talkButton.classList.add('recording');
                ripple1.classList.remove('hidden');
                ripple2.classList.remove('hidden');
                waveformContainer.classList.remove('hidden');
                pauseButton.classList.add('show');
                stopButton.classList.remove('show');
                currentTranscript = '';
                recordingStartTime = Date.now();
                startRecordingTimer();
                updateDisplay();
            };

            recognition.onresult = (event) => {
                currentTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    currentTranscript += transcript + ' ';
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    }
                }
                updateDisplay();
            };

            recognition.onerror = (event) => {
                showError(`Error: ${event.error}`);
                stopRecording();
            };

            recognition.onend = () => {
                isRecording = false;
                talkButton.classList.remove('recording');
                ripple1.classList.add('hidden');
                ripple2.classList.add('hidden');
                waveformContainer.classList.add('hidden');
                pauseButton.classList.remove('show');
                stopButton.classList.add('show');
                clearInterval(recordingTimer);
                if (finalTranscript.trim()) {
                    copyToClipboard(false);
                }
            };
        }

        talkButton.addEventListener('mousedown', startRecording);
        talkButton.addEventListener('mouseup', stopRecording);
        talkButton.addEventListener('mouseleave', stopRecording);
        talkButton.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        talkButton.addEventListener('touchend', stopRecording);

        pauseButton.addEventListener('click', stopRecording);
        copyButton.addEventListener('click', () => copyToClipboard(true));
        clearButton.addEventListener('click', clearTranscript);
        btnGrammar.addEventListener('click', () => processWithAI('grammar'));
        btnSummarize.addEventListener('click', () => processWithAI('summarize'));
        btnFormat.addEventListener('click', () => processWithAI('format'));
        copyAiButton.addEventListener('click', copyAiResult);

        function startRecording() {
            if (!isRecording && recognition) {
                try {
                    clearError();
                    recognition.start();
                } catch (e) {}
            }
        }

        function stopRecording() {
            if (isRecording && recognition) {
                try {
                    recognition.stop();
                } catch (e) {}
            }
        }

        function startRecordingTimer() {
            recordingTimer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const hours = Math.floor(elapsed / 3600);
                const minutes = Math.floor((elapsed % 3600) / 60);
                const seconds = elapsed % 60;
                recordingTime.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 100);
        }

        function updateDisplay() {
            const displayText = (finalTranscript + currentTranscript).trim();
            if (displayText) {
                transcriptText.textContent = displayText;
                transcriptText.classList.remove('placeholder');
            } else if (!isRecording) {
                transcriptText.textContent = 'Click and hold the button to start talking...';
                transcriptText.classList.add('placeholder');
            } else {
                transcriptText.textContent = 'Listening...';
                transcriptText.classList.add('placeholder');
            }
            charCount.textContent = `${displayText.length} characters`;
            updateUIState();
        }

        function updateUIState() {
            const hasText = (finalTranscript + currentTranscript).trim().length > 0;
            if (hasText && !isRecording) {
                transcriptSection.style.display = 'flex';
                actions.style.display = 'flex';
                aiSection.style.display = 'flex';
            } else if (!isRecording) {
                transcriptSection.style.display = 'none';
                actions.style.display = 'none';
                aiSection.style.display = 'none';
            }
            copyButton.disabled = !hasText;
            clearButton.disabled = !hasText;
            btnGrammar.disabled = !hasText;
            btnSummarize.disabled = !hasText;
            btnFormat.disabled = !hasText;
        }

        function copyToClipboard(showNotice) {
            const textToCopy = (finalTranscript + currentTranscript).trim();
            if (!textToCopy) return;
            navigator.clipboard.writeText(textToCopy)
                .then(() => { if (showNotice) showToast('✓ Copied'); })
                .catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = textToCopy;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    if (showNotice) showToast('✓ Copied');
                });
        }

        function clearTranscript() {
            finalTranscript = '';
            currentTranscript = '';
            transcriptText.textContent = 'Click and hold the button to start talking...';
            transcriptText.classList.add('placeholder');
            charCount.textContent = '0 characters';
            recordingTime.textContent = '00:00:00';
            aiResultArea.classList.remove('show');
            updateUIState();
        }

        async function processWithAI(operation) {
            const text = (finalTranscript + currentTranscript).trim();
            if (!text) return;

            const btn = { grammar: btnGrammar, summarize: btnSummarize, format: btnFormat }[operation];
            const labels = { grammar: '✏️ Grammar Fix', summarize: '📝 Summary', format: '🗂️ Format' };

            btn.classList.add('loading');
            btn.disabled = true;
            aiResultArea.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/api/process`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, operation }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Processing failed');
                }

                aiResultLabel.textContent = labels[operation];
                aiResultText.textContent = data.result;
                aiResultArea.classList.add('show');
            } catch (err) {
                showError('AI error: ' + err.message);
            } finally {
                btn.classList.remove('loading');
                updateUIState();
            }
        }

        function copyAiResult() {
            const text = aiResultText.textContent;
            if (!text) return;
            navigator.clipboard.writeText(text)
                .then(() => showToast('✓ AI result copied'))
                .catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('✓ AI result copied');
                });
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function clearError() {
            errorMessage.classList.remove('show');
        }
    </script>
</body>
</html>
